<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EtiketFarmasi — Mengalihkan...</title>
    <style>
      body {
        margin: 0;
        background: #06080f;
        color: #e8eaff;
        font-family: "DM Sans", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 12px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(99, 120, 255, 0.2);
        border-top-color: #6378ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        color: #8890aa;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <p>Mengalihkan ke halaman yang sesuai...</p>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("isset/session");
          if (!raw) {
            window.location.href = "index.html";
            return;
          }
          var sess = JSON.parse(raw);
          if (!sess) {
            window.location.href = "index.html";
            return;
          }

          // Beri delay 1.5 detik agar animasi spinner transisi terlihat
          setTimeout(function () {
            window.location.href = "user.html";
          }, 1500);
        } catch (e) {
          window.location.href = "index.html";
        }
      })();
    </script>
  </body>
</html>
